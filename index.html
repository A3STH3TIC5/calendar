<div id="app-root"></div>
<style>
  #app-root {
    --paper: #FBF6EC;
    --ink: #20283A;
    --ink-soft: #5B6478;
    --line: #DCD3BE;
    --accent: #E8633A;
    --accent-soft: #F6D9C9;
    --everyone: #2F8F6F;
    --everyone-soft: #D9EFE4;
    --card: #FFFFFF;
    font-family: 'Spectral', 'Noto Serif KR', serif;
    color: var(--ink);
    background: var(--paper);
    min-height: 100%;
    padding: 28px 18px 60px;
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
  }
  #app-root * { box-sizing: border-box; font-family: inherit; }
  #app-root .sans {
    font-family: 'Pretendard', 'Noto Sans KR', -apple-system, sans-serif;
  }
  #app-root .wrap { max-width: 880px; margin: 0 auto; }

  /* Header */
  #app-root .masthead {
    display: flex; justify-content: space-between; align-items: flex-end;
    border-bottom: 3px solid var(--ink); padding-bottom: 14px; margin-bottom: 22px;
    flex-wrap: wrap; gap: 10px;
  }
  #app-root .masthead h1 {
    font-size: 30px; font-weight: 700; letter-spacing: -0.01em; margin: 0;
  }
  #app-root .masthead .eyebrow {
    font-family: 'Pretendard','Noto Sans KR',sans-serif;
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--accent); font-weight: 700; margin-bottom: 4px; display:block;
  }
  #app-root .save-state {
    font-family: 'Pretendard','Noto Sans KR',sans-serif;
    font-size: 12px; color: var(--ink-soft); align-self: flex-end;
  }

  /* Layout */
  #app-root .grid2 {
    display: grid; grid-template-columns: 230px 1fr; gap: 20px; align-items: start;
    margin-bottom: 34px;
  }
  @media (max-width: 700px) { #app-root .grid2 { grid-template-columns: 1fr; } }

  /* Members panel */
  #app-root .panel {
    background: var(--card); border: 1px solid var(--line); border-radius: 10px;
    padding: 16px;
  }
  #app-root .panel h2 {
    font-family: 'Pretendard','Noto Sans KR',sans-serif;
    font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--ink-soft); margin: 0 0 12px; font-weight: 700;
  }
  #app-root .member-row {
    display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: 7px;
    margin-bottom: 4px; cursor: pointer; transition: background .15s;
    font-family: 'Pretendard','Noto Sans KR',sans-serif; font-size: 14px;
  }
  #app-root .member-row:hover { background: #F4EEE0; }
  #app-root .member-row.active { background: var(--accent-soft); font-weight: 700; }
  #app-root .dot { width: 11px; height: 11px; border-radius: 50%; flex: none; }
  #app-root .member-row .del {
    margin-left: auto; opacity: 0; color: var(--ink-soft); font-size: 12px;
    background: none; border: none; cursor: pointer; padding: 2px 4px;
  }
  #app-root .member-row:hover .del { opacity: 1; }
  #app-root .add-member { display: flex; gap: 6px; margin-top: 10px; }
  #app-root input[type="text"], #app-root input[type="url"] {
    font-family: 'Pretendard','Noto Sans KR',sans-serif;
    border: 1px solid var(--line); border-radius: 7px; padding: 7px 9px;
    font-size: 14px; background: #FFFDF8; color: var(--ink); width: 100%;
  }
  #app-root input:focus, #app-root select:focus, #app-root textarea:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  #app-root button.primary {
    font-family: 'Pretendard','Noto Sans KR',sans-serif; font-weight: 700; font-size: 13px;
    background: var(--ink); color: var(--paper); border: none; border-radius: 7px;
    padding: 7px 12px; cursor: pointer; white-space: nowrap;
  }
  #app-root button.primary:hover { background: var(--accent); }
  #app-root .hint {
    font-family: 'Pretendard','Noto Sans KR',sans-serif; font-size: 12px;
    color: var(--ink-soft); margin-top: 10px; line-height: 1.5;
  }

  /* Calendar panel */
  #app-root .cal-head {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
  }
  #app-root .cal-head .month { font-size: 20px; font-weight: 700; }
  #app-root .cal-nav { display: flex; gap: 6px; }
  #app-root .cal-nav button {
    background: var(--card); border: 1px solid var(--line); border-radius: 6px;
    width: 30px; height: 30px; cursor: pointer; font-size: 15px; color: var(--ink);
  }
  #app-root .cal-nav button:hover { border-color: var(--ink); }
  #app-root .weekdays {
    display: grid; grid-template-columns: repeat(7,1fr);
    font-family: 'Pretendard','Noto Sans KR',sans-serif; font-size: 11px;
    color: var(--ink-soft); text-transform: uppercase; letter-spacing: .06em;
    margin-bottom: 4px;
  }
  #app-root .weekdays div { text-align: center; padding: 4px 0; }
  #app-root .days {
    display: grid; grid-template-columns: repeat(7,1fr); gap: 4px;
  }
  #app-root .day {
    background: var(--card); border: 1px solid var(--line); border-radius: 8px;
    min-height: 58px; padding: 5px; cursor: pointer; position: relative;
    display: flex; flex-direction: column; gap: 3px; transition: transform .1s, border-color .15s;
  }
  #app-root .day:hover { border-color: var(--ink); }
  #app-root .day.empty { background: transparent; border: none; cursor: default; }
  #app-root .day .num {
    font-family: 'Pretendard','Noto Sans KR',sans-serif; font-size: 12px; font-weight: 700;
    color: var(--ink-soft);
  }
  #app-root .day.everyone { background: var(--everyone-soft); border-color: var(--everyone); }
  #app-root .day.everyone .num { color: var(--everyone); }
  #app-root .day.mine { box-shadow: inset 0 0 0 2px var(--accent); }
  #app-root .day .dots { display: flex; flex-wrap: wrap; gap: 2px; }
  #app-root .day .dots .dot { width: 7px; height: 7px; }
  #app-root .day .everyone-tag {
    font-family: 'Pretendard','Noto Sans KR',sans-serif; font-size: 9px; font-weight: 700;
    color: var(--everyone); letter-spacing: .02em;
  }
  #app-root .legend {
    font-family: 'Pretendard','Noto Sans KR',sans-serif; font-size: 12px; color: var(--ink-soft);
    margin-top: 10px; display: flex; gap: 14px; flex-wrap: wrap; align-items: center;
  }
  #app-root .legend span.box { display:inline-block; width: 11px; height: 11px; border-radius: 3px; margin-right: 5px; vertical-align: -1px; }

  /* Scrap section */
  #app-root .section-title {
    display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px;
    border-bottom: 1px solid var(--line); padding-bottom: 8px;
  }
  #app-root .section-title h2 { font-size: 22px; margin: 0; font-weight: 700; }
  #app-root .section-title .count {
    font-family: 'Pretendard','Noto Sans KR',sans-serif; font-size: 13px; color: var(--ink-soft);
  }
  #app-root .scrap-form {
    background: var(--card); border: 1px solid var(--line); border-radius: 10px;
    padding: 14px; margin-bottom: 16px; display: grid; gap: 8px;
    grid-template-columns: 100px 1fr 1fr; align-items: start;
  }
  @media (max-width: 700px) { #app-root .scrap-form { grid-template-columns: 1fr; } }
  #app-root select {
    font-family: 'Pretendard','Noto Sans KR',sans-serif;
    border: 1px solid var(--line); border-radius: 7px; padding: 7px 8px; font-size: 13px;
    background: #FFFDF8; color: var(--ink);
  }
  #app-root .scrap-form .row-span2 { grid-column: span 2; }
  @media (max-width: 700px) { #app-root .scrap-form .row-span2 { grid-column: span 1; } }
  #app-root .scrap-form .submit-row { grid-column: 1 / -1; display:flex; justify-content:flex-end; }

  #app-root .scrap-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 14px;
  }
  #app-root .scrap-card {
    background: var(--card); border: 1px solid var(--line); border-radius: 10px; overflow: hidden;
    display: flex; flex-direction: column; position: relative;
  }
  #app-root .scrap-card .thumb {
    width: 100%; height: 110px; object-fit: cover; background: var(--accent-soft); display:block;
  }
  #app-root .scrap-card .thumb-fallback {
    width: 100%; height: 110px; display: flex; align-items: center; justify-content: center;
    font-size: 34px; background: var(--accent-soft);
  }
  #app-root .scrap-card .body { padding: 10px 12px 12px; }
  #app-root .scrap-card .tag {
    font-family: 'Pretendard','Noto Sans KR',sans-serif; font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .06em; color: var(--accent); margin-bottom: 4px; display:block;
  }
  #app-root .scrap-card .title { font-size: 15px; font-weight: 700; line-height: 1.3; margin: 0 0 4px; }
  #app-root .scrap-card a.link {
    font-family: 'Pretendard','Noto Sans KR',sans-serif; font-size: 12px; color: var(--ink-soft);
    text-decoration: none; word-break: break-all; display:block; margin-top: 2px;
  }
  #app-root .scrap-card a.link:hover { color: var(--accent); text-decoration: underline; }
  #app-root .scrap-card .del {
    position: absolute; top: 6px; right: 6px; background: rgba(255,255,255,.9); border: none;
    border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-size: 12px; color: var(--ink-soft);
  }
  #app-root .scrap-card .del:hover { color: var(--accent); }
  #app-root .empty-state {
    font-family: 'Pretendard','Noto Sans KR',sans-serif; color: var(--ink-soft); font-size: 13px;
    border: 1px dashed var(--line); border-radius: 10px; padding: 22px; text-align: center;
  }

  #app-root .day-modal-backdrop {
    position: fixed; inset: 0; background: rgba(32,40,58,0.35); display:flex; align-items:center; justify-content:center;
    z-index: 50;
  }
  #app-root .day-modal {
    background: var(--card); border-radius: 12px; padding: 18px 20px; width: 280px;
    font-family: 'Pretendard','Noto Sans KR',sans-serif;
  }
  #app-root .day-modal h3 { margin: 0 0 10px; font-family: 'Spectral', serif; font-size: 18px; }
  #app-root .day-modal .who { display:flex; align-items:center; gap:8px; padding: 5px 0; font-size: 14px; }
  #app-root .day-modal .who .dot { width: 10px; height: 10px; }
  #app-root .day-modal .who .yes { color: var(--everyone); font-weight: 700; margin-left:auto; font-size: 12px; }
  #app-root .day-modal .who .no { color: var(--ink-soft); margin-left:auto; font-size: 12px; }
  #app-root .day-modal .close-row { margin-top: 12px; display:flex; justify-content:flex-end; }
  #app-root .day-modal button.ghost {
    background: none; border: 1px solid var(--line); border-radius: 7px; padding: 6px 12px;
    cursor: pointer; font-size: 12px; color: var(--ink);
  }
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const PALETTE = ["#E8633A","#2F8F6F","#3B6FA8","#9C5BC4","#C98A2B","#D14D74","#4F9B9B","#7A8B3F"];
const KEY = "planner-data-v1";

function uid() { return Math.random().toString(36).slice(2,9); }
function dateKey(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function todayKey(){ const t=new Date(); return dateKey(t.getFullYear(), t.getMonth(), t.getDate()); }

function emptyData(){
  return { members: [], availability: {}, scraps: [] };
}

function detectScrapType(url){
  if (!url) return "link";
  if (/youtu\.?be/i.test(url)) return "youtube";
  if (/\.(png|jpe?g|gif|webp|avif)(\?|$)/i.test(url)) return "image";
  return "link";
}

function youtubeId(url){
  const m = url.match(/(?:youtu\.be\/|v=|embed\/)([A-Za-z0-9_-]{6,})/);
  return m ? m[1] : null;
}

function App(){
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [saveState, setSaveState] = useState("");
  const [activeMember, setActiveMember] = useState(null);
  const [newMemberName, setNewMemberName] = useState("");
  const [viewYear, setViewYear] = useState(new Date().getFullYear());
  const [viewMonth, setViewMonth] = useState(new Date().getMonth());
  const [modalDate, setModalDate] = useState(null);
  const [scrapType, setScrapType] = useState("link");
  const [scrapUrl, setScrapUrl] = useState("");
  const [scrapTitle, setScrapTitle] = useState("");
  const saveTimer = useRef(null);

  const load = useCallback(async () => {
    try {
      const res = await window.storage.get(KEY, true);
      setData(res ? JSON.parse(res.value) : emptyData());
    } catch (e) {
      setData(emptyData());
    }
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, [load]);

  const persist = useCallback((next) => {
    setData(next);
    setSaveState("저장 중…");
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      try {
        await window.storage.set(KEY, JSON.stringify(next), true);
        setSaveState("모두에게 저장됨");
      } catch (e) {
        setSaveState("저장 실패 — 다시 시도해 주세요");
      }
    }, 250);
  }, []);

  if (loading || !data) {
    return <div className="sans" style={{padding: 40, fontSize: 14, color: "#5B6478"}}>불러오는 중…</div>;
  }

  function addMember(){
    const name = newMemberName.trim();
    if (!name) return;
    const color = PALETTE[data.members.length % PALETTE.length];
    const m = { id: uid(), name, color };
    const next = { ...data, members: [...data.members, m] };
    persist(next);
    setNewMemberName("");
    if (!activeMember) setActiveMember(m.id);
  }

  function removeMember(id){
    const av = { ...data.availability };
    delete av[id];
    const next = { ...data, members: data.members.filter(m => m.id !== id), availability: av };
    persist(next);
    if (activeMember === id) setActiveMember(next.members[0]?.id || null);
  }

  function toggleDate(memberId, key){
    if (!memberId) return;
    const cur = new Set(data.availability[memberId] || []);
    if (cur.has(key)) cur.delete(key); else cur.add(key);
    const next = { ...data, availability: { ...data.availability, [memberId]: Array.from(cur) } };
    persist(next);
  }

  function addScrap(){
    if (!scrapUrl.trim() && !scrapTitle.trim()) return;
    const item = {
      id: uid(),
      type: scrapType,
      url: scrapUrl.trim(),
      title: scrapTitle.trim() || scrapUrl.trim() || "제목 없음",
      addedAt: Date.now(),
    };
    const next = { ...data, scraps: [item, ...data.scraps] };
    persist(next);
    setScrapUrl(""); setScrapTitle("");
  }

  function removeScrap(id){
    persist({ ...data, scraps: data.scraps.filter(s => s.id !== id) });
  }

  // calendar calc
  const first = new Date(viewYear, viewMonth, 1);
  const startWeekday = first.getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const cells = [];
  for (let i=0; i<startWeekday; i++) cells.push(null);
  for (let d=1; d<=daysInMonth; d++) cells.push(d);

  function membersAvailable(key){
    return data.members.filter(m => (data.availability[m.id]||[]).includes(key));
  }

  function changeMonth(delta){
    let m = viewMonth + delta, y = viewYear;
    if (m < 0) { m = 11; y -= 1; } else if (m > 11) { m = 0; y += 1; }
    setViewMonth(m); setViewYear(y);
  }

  const weekdayLabels = ["일","월","화","수","목","금","토"];

  return (
    <div className="wrap">
      <div className="masthead">
        <div>
          <span className="eyebrow sans">모임 일정 조율</span>
          <h1>일정조율 캘린더</h1>
        </div>
        <div className="save-state sans">{saveState}</div>
      </div>

      <div className="grid2">
        <div className="panel">
          <h2>멤버</h2>
          {data.members.length === 0 && (
            <div className="hint">멤버를 추가하고 이름을 눌러 선택한 뒤, 달력에서 본인이 가능한 날짜를 클릭하세요.</div>
          )}
          {data.members.map(m => (
            <div key={m.id} className={"member-row" + (activeMember===m.id ? " active":"")} onClick={() => setActiveMember(m.id)}>
              <span className="dot" style={{background: m.color}}></span>
              <span>{m.name}</span>
              <button className="del" onClick={(e)=>{e.stopPropagation(); removeMember(m.id);}} title="삭제">✕</button>
            </div>
          ))}
          <div className="add-member">
            <input type="text" placeholder="이름 입력" value={newMemberName}
              onChange={e=>setNewMemberName(e.target.value)}
              onKeyDown={e=>{ if(e.key==='Enter') addMember(); }} />
            <button className="primary" onClick={addMember}>추가</button>
          </div>
          {data.members.length > 0 && (
            <div className="hint">
              현재 선택: <strong>{data.members.find(m=>m.id===activeMember)?.name || "없음"}</strong><br/>
              달력 날짜를 클릭하면 선택된 사람의 가능 여부가 바뀝니다.
            </div>
          )}
        </div>

        <div className="panel">
          <div className="cal-head">
            <div className="month">{viewYear}년 {viewMonth+1}월</div>
            <div className="cal-nav">
              <button onClick={()=>changeMonth(-1)}>‹</button>
              <button onClick={()=>changeMonth(1)}>›</button>
            </div>
          </div>
          <div className="weekdays sans">
            {weekdayLabels.map(w => <div key={w}>{w}</div>)}
          </div>
          <div className="days">
            {cells.map((d, i) => {
              if (d === null) return <div className="day empty" key={i}></div>;
              const key = dateKey(viewYear, viewMonth, d);
              const avail = membersAvailable(key);
              const everyone = data.members.length > 0 && avail.length === data.members.length;
              const mine = activeMember && avail.some(m=>m.id===activeMember);
              const isToday = key === todayKey();
              return (
                <div
                  key={i}
                  className={"day" + (everyone ? " everyone":"") + (mine ? " mine":"")}
                  style={isToday ? {borderStyle:"dashed"} : null}
                  onClick={() => { if (activeMember) toggleDate(activeMember, key); else setModalDate(key); }}
                  onContextMenu={(e)=>{ e.preventDefault(); setModalDate(key); }}
                  title="클릭: 가능 여부 토글 / 우클릭: 누가 가능한지 보기"
                >
                  <span className="num">{d}</span>
                  <span className="dots">
                    {avail.map(m => <span className="dot" key={m.id} style={{background:m.color}}></span>)}
                  </span>
                  {everyone && <span className="everyone-tag sans">전원 가능</span>}
                </div>
              );
            })}
          </div>
          <div className="legend sans">
            <span><span className="box" style={{background:"var(--everyone-soft)", border:"1px solid var(--everyone)"}}></span>전원 가능한 날</span>
            <span><span className="box" style={{background:"#fff", boxShadow:"inset 0 0 0 2px var(--accent)"}}></span>내가 가능 표시한 날</span>
            <span>날짜 우클릭(또는 길게보기)으로 누가 가능한지 확인</span>
          </div>
        </div>
      </div>

      <div className="section-title">
        <h2>이거 하자</h2>
        <span className="count sans">{data.scraps.length}개 스크랩</span>
      </div>
      <div className="scrap-form">
        <select value={scrapType} onChange={e=>setScrapType(e.target.value)}>
          <option value="link">웹페이지</option>
          <option value="youtube">유튜브</option>
          <option value="image">사진</option>
        </select>
        <input className="row-span2" type="url" placeholder="링크 또는 이미지 URL 붙여넣기"
          value={scrapUrl}
          onChange={e=>{ const v=e.target.value; setScrapUrl(v); setScrapType(detectScrapType(v)); }} />
        <input className="row-span2" type="text" placeholder="제목 (선택)"
          value={scrapTitle} onChange={e=>setScrapTitle(e.target.value)}
          onKeyDown={e=>{ if(e.key==='Enter') addScrap(); }} />
        <div className="submit-row" style={{gridColumn:"1 / -1"}}>
          <button className="primary" onClick={addScrap}>스크랩 추가</button>
        </div>
      </div>

      {data.scraps.length === 0 ? (
        <div className="empty-state">아직 스크랩이 없어요. 사진 주소, 웹페이지 링크, 유튜브 링크를 추가해 보세요.</div>
      ) : (
        <div className="scrap-grid">
          {data.scraps.map(s => {
            const yid = s.type === "youtube" ? youtubeId(s.url) : null;
            return (
              <div className="scrap-card" key={s.id}>
                <button className="del" onClick={()=>removeScrap(s.id)} title="삭제">✕</button>
                {s.type === "image" && s.url ? (
                  <img className="thumb" src={s.url} alt={s.title} onError={(e)=>{e.target.style.display='none';}} />
                ) : s.type === "youtube" && yid ? (
                  <img className="thumb" src={`https://img.youtube.com/vi/${yid}/mqdefault.jpg`} alt={s.title} />
                ) : (
                  <div className="thumb-fallback">{s.type === "youtube" ? "▶" : "🔗"}</div>
                )}
                <div className="body">
                  <span className="tag sans">{s.type === "youtube" ? "유튜브" : s.type === "image" ? "사진" : "웹페이지"}</span>
                  <p className="title">{s.title}</p>
                  {s.url && <a className="link" href={s.url} target="_blank" rel="noopener noreferrer">{s.url}</a>}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {modalDate && (
        <div className="day-modal-backdrop" onClick={()=>setModalDate(null)}>
          <div className="day-modal" onClick={e=>e.stopPropagation()}>
            <h3>{modalDate}</h3>
            {data.members.length === 0 && <div style={{fontSize:13, color:"var(--ink-soft)"}}>멤버가 없습니다.</div>}
            {data.members.map(m => {
              const ok = (data.availability[m.id]||[]).includes(modalDate);
              return (
                <div className="who" key={m.id}>
                  <span className="dot" style={{background:m.color}}></span>
                  <span>{m.name}</span>
                  <span className={ok ? "yes":"no"}>{ok ? "가능" : "미확정"}</span>
                </div>
              );
            })}
            <div className="close-row">
              <button className="ghost" onClick={()=>setModalDate(null)}>닫기</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App />);
</script>
